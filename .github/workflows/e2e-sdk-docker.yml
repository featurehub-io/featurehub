name: e2e-sdk docker build

on:
  push:
    branches:
      - main
    paths:
      - 'adks/e2e-sdk/**'
      - '.github/workflows/e2e-sdk-docker.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: adks/e2e-sdk
          push: true
          build-args: |
            branch=${{ github.ref_name }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:latest
