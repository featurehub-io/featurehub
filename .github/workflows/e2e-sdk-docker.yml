name: e2e-sdk docker build

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
  push:
    branches:
      - main
    paths:
      - 'adks/e2e-sdk/**'
      - '.github/workflows/e2e-sdk-docker.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Condition to run the job:
    # Either the event is a push to the main branch,
    # OR the event is a pull_request and it contains the 'your-label-name' label.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build-e2e-image')) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 25 and Maven 3.9
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Maven tiles and APIs because e2e SDK needs them
        working-directory: backend
        run: mvn -B -f pom-first.xml install && mvn -B -f pom-only-apis.xml install

      - name: Generate code for e2e tests, generates from the APIs
        working-directory: adks/e2e-sdk
        run: mvn -B generate-sources

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Determine branch names
        id: branch-names
        uses: tj-actions/branch-names@v9.0.2

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: adks/e2e-sdk
          push: true
          build-args: |
            branch=${{ steps.branch-names.outputs.current_branch }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ steps.branch-names.outputs.current_branch }}
